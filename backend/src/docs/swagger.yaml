openapi: 3.0.0
info:
  title: EAM Backend API
  version: 1.0.0

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/auth/login:
    post:
      summary: Login user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Success
        401:
          description: Unauthorized

  /api/work-order:
    post:
      tags:
        - Work Order
      summary: Get Work Orders
      description: Retrieve work orders with optional filters (status, org, location, date range, work order code)
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                workOrderCode:
                  type: string
                  example: "30085"
                org:
                  type: string
                  example: "TSUSHO1"
                location:
                  type: string
                  example: "S686"
                fromDate:
                  type: string
                  description: Start date
                  example: "10-APR-2026"
                toDate:
                  type: string
                  description: End date
                  example: "31-MAY-2026"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        workOrderCode:
                          type: string
                          example: "30085"
                        description:
                          type: string
                          example: "Asset Check 1"
                        location:
                          type: string
                          example: "S686"
                        organization:
                          type: string
                          example: "TSUSHO1"
                        objectOrganization:
                          type: string
                          example: "TSUSHO"
                        pmCode:
                          type: string
                          example: "ASSET_CHECK_01"
                        status:
                          type: string
                          example: "OPEN"
                        startDate:
                          type: string
                          example: "01-MAY-2026 00:00"
                        endDate:
                          type: string
                          example: "01-MAY-2026 00:00"
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /api/asset:
    get:
      tags:
        - Asset
      summary: Get asset details
      description: Retrieve asset information from HxGN EAM
      security:
        - bearerAuth: []
      parameters:
        - name: assetCode
          in: query
          required: true
          schema:
            type: string
          example: FF25003/HQ

        - name: orgCode
          in: query
          required: true
          schema:
            type: string
          example: TSUSHO

      responses:
        200:
          description: Asset retrieved successfully

        400:
          description: Missing required parameters

        401:
          description: Unauthorized

        500:
          description: Internal server error

  /api/asset/profile-picture:
    get:
      tags:
        - Asset
      summary: Get asset profile picture
      description: Retrieve asset profile image from HxGN
      security:
        - bearerAuth: []
      parameters:
        - name: documentCode
          in: query
          required: true
          schema:
            type: string
          example: 00AMBV12AP001_PP

      responses:
        200:
          description: Image file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

        400:
          description: Missing documentCode

        401:
          description: Unauthorized

        404:
          description: Document not found

  /api/asset/details:
    get:
      tags:
        - Asset
      summary: Get asset with profile picture
      security:
        - bearerAuth: []
      parameters:
        - name: assetCode
          in: query
          required: true
          schema:
            type: string

        - name: orgCode
          in: query
          required: true
          schema:
            type: string

        - name: includeImage
          in: query
          required: false
          schema:
            type: boolean
          example: true

      responses:
        200:
          description: Asset with optional image

  /api/asset/search:
    get:
      summary: Search assets with multiple filters
      description: Retrieve assets using dynamic filters such as primary system, status, organization, class, or asset code.
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: primarySystem
          schema:
            type: string
          description: Filter by primary system (OBJ_PRIMARYSYSTEM)
          example: ALPHARD / CAMRY

        - in: query
          name: status
          schema:
            type: string
          description: Asset status (e.g. I, A)

        - in: query
          name: org
          schema:
            type: string
          description: Organization code

        - in: query
          name: classDesc
          schema:
            type: string
          description: Class description

        - in: query
          name: assetCode
          schema:
            type: string
          description: Asset code

      responses:
        "200":
          description: Successful response
          content:
            application/json:
              examples:
                example:
                  value:
                    success: true
                    data:
                      - assetCode: "FF25228/HQ-1"
                        description: "Foldable table"
                        organization: "TSUSHO"
                        organizationDescription: "Toyota Tsusho"
                        status: "I"
                        class: "Furniture & fittings"
                        primarySystem: "CAMRY"
                        commissionDate: "07-NOV-2025 00:00"
                        document: ""

        "400":
          description: Bad request

        "401":
          description: Unauthorized

        "500":
          description: Internal server error

  /api/asset/location/{location}:
    get:
      summary: Get assets by location (primary system)
      description: Retrieve assets filtered by location (OBJ_PRIMARYSYSTEM)
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: location
          required: true
          schema:
            type: string
          example: CAMRY
          description: Primary system / location

      responses:
        "200":
          description: Successful response
          content:
            application/json:
              examples:
                example:
                  value:
                    success: true
                    data:
                      - assetCode: "FF25228/HQ-1"
                        description: "Foldable table"
                        primarySystem: "CAMRY"

        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "500":
          description: Internal server error