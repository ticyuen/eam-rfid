openapi: 3.0.0
info:
  title: EAM Backend API
  version: 1.0.0

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/auth/login:
    post:
      summary: Login user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              example:
                username: "TEST"
                password: "asd"
      responses:
        200:
          description: Success
        401:
          description: Unauthorized

  /api/auth/log-login:
    post:
      tags:
        - Auth
      summary: Log user login event
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - loginStatus
              properties:
                username:
                  type: string
                  example: TEST
                deviceName:
                  type: string
                  example: TC22
                deviceIp:
                  type: string
                  example: 10.0.0.1
                loginStatus:
                  type: string
                  example: SUCCESS

      responses:
        "200":
          description: Login log saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      message:
                        type: string
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "500":
          description: Server error

  /api/work-order:
    post:
      tags:
        - Work Order
      summary: Get Work Orders
      description: Retrieve work orders with optional filters (status, org, location, date range, work order code)
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                workOrderCode:
                  type: string
                  example: "30085"
                org:
                  type: string
                  example: "TSUSHO1"
                location:
                  type: string
                  example: "S686"
                fromDate:
                  type: string
                  description: Start date
                  example: "10-APR-2026"
                toDate:
                  type: string
                  description: End date
                  example: "31-MAY-2026"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        workOrderCode:
                          type: string
                          example: "30085"
                        description:
                          type: string
                          example: "Asset Check 1"
                        location:
                          type: string
                          example: "S686"
                        organization:
                          type: string
                          example: "TSUSHO1"
                        objectOrganization:
                          type: string
                          example: "TSUSHO"
                        pmCode:
                          type: string
                          example: "ASSET_CHECK_01"
                        status:
                          type: string
                          example: "OPEN"
                        startDate:
                          type: string
                          example: "01-MAY-2026 00:00"
                        endDate:
                          type: string
                          example: "01-MAY-2026 00:00"
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /api/asset:
    get:
      tags:
        - Asset
      summary: Get asset details
      description: Retrieve asset information from HxGN EAM
      security:
        - bearerAuth: []
      parameters:
        - name: assetCode
          in: query
          required: true
          schema:
            type: string
          example: FF25003/HQ

        - name: orgCode
          in: query
          required: true
          schema:
            type: string
          example: TSUSHO

      responses:
        200:
          description: Asset retrieved successfully

        400:
          description: Missing required parameters

        401:
          description: Unauthorized

        500:
          description: Internal server error

  /api/asset/profile-picture:
    get:
      tags:
        - Asset
      summary: Get asset profile picture
      description: Retrieve asset profile image from HxGN
      security:
        - bearerAuth: []
      parameters:
        - name: documentCode
          in: query
          required: true
          schema:
            type: string
          example: 00AMBV12AP001_PP

      responses:
        200:
          description: Image file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

        400:
          description: Missing documentCode

        401:
          description: Unauthorized

        404:
          description: Document not found

  /api/asset/details:
    get:
      tags:
        - Asset
      summary: Get asset with profile picture
      security:
        - bearerAuth: []
      parameters:
        - name: assetCode
          in: query
          required: true
          schema:
            type: string

        - name: orgCode
          in: query
          required: true
          schema:
            type: string

        - name: includeImage
          in: query
          required: false
          schema:
            type: boolean
          example: true

      responses:
        200:
          description: Asset with optional image

  /api/asset/search:
    get:
      summary: Search assets with multiple filters
      description: Retrieve assets using dynamic filters such as zone, status, organization, or asset code.
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: zone
          schema:
            type: string
          description: Filter by zone
          example: PANTRY

        - in: query
          name: status
          schema:
            type: string
          description: Asset status (e.g. I, A)

        - in: query
          name: org
          schema:
            type: string
          description: Organization code

        - in: query
          name: assetCode
          schema:
            type: string
          description: Asset code

        - in: query
          name: rfidCode
          schema:
            type: string
          description: Single RFID code

      responses:
        "200":
          description: Successful response
          content:
            application/json:
              examples:
                example:
                  value:
                    success: true
                    data:
                      - assetCode: "FF25228/HQ-1"
                        description: "Foldable table"
                        organization: "TSUSHO"
                        organizationDescription: "Toyota Tsusho"
                        status: "I"
                        class: "Furniture & fittings"
                        zone: "CAMRY"
                        commissionDate: "07-NOV-2025 00:00"
                        document: ""

        "400":
          description: Bad request

        "401":
          description: Unauthorized

        "500":
          description: Internal server error

  /api/asset/rfid/scan:
    post:
      summary: Scan assets by RFID
      description: Scan multiple RFID tags and return matching assets.
      tags:
        - Asset
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rfidCodes
              properties:
                rfidCodes:
                  type: array
                  items:
                    type: string
                  example: ["E280116060000206126D6D20", "3014F41460000040000022F0"]
                  description: List of RFID codes to scan

                org:
                  type: string
                  example: "TSUSHO"
                  description: Optional organization filter (applied after fetch)

      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        assetCode:
                          type: string
                          example: "A1001"
                        description:
                          type: string
                          example: "Pump Motor"
                        organization:
                          type: string
                          example: "ORG1"
                        organizationDescription:
                          type: string
                          example: "Main Plant"
                        location:
                          type: string
                          example: "ZONE-A"
                        department:
                          type: string
                          example: "Maintenance"
                        status:
                          type: string
                          example: "Installed"
                        zone:
                          type: string
                          example: "Z1"
                        commissionDate:
                          type: string
                          example: "2024-01-01T00:00:00Z"
                        profilePicture:
                          type: string
                          example: "DOC123"
                        rfidCode:
                          type: string
                          example: "RF001"
                  message:
                    type: string
                    example: ""

        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /api/asset/zone/{zone}:
    get:
      summary: Get assets by zone
      description: Retrieve assets filtered by zone
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: zone
          required: true
          schema:
            type: string
          example: PANTRY

      responses:
        "200":
          description: Successful response
          content:
            application/json:
              examples:
                example:
                  value:
                    success: true
                    data:
                      - assetCode: "FF25228/HQ-1"
                        description: "Foldable table"
                        zone: "PANTRY"

        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /api/work-order/scan:
    post:
      tags:
        - Work Order
      summary: Create work order scan record
      description: |
        Creates a work order scan entry in HXGN UUWOSC user defined screen.
        Used by mobile devices or scanners to log work order scan events.
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workOrderId
                - status
              properties:
                workOrderId:
                  type: string
                  example: "12345"
                status:
                  type: string
                  example: "Released"
                deviceName:
                  type: string
                  example: "TC22"
                deviceIp:
                  type: string
                  example: "127.0.0.1"
                remark:
                  type: string
                  example: "Something.."

      responses:
        200:
          description: Scan record created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: "The record was successfully saved."
                      record:
                        type: object
                        properties:
                          USERDEFINEDSCREENNAME:
                            type: string
                            example: "UUWOSC"

        400:
          description: Validation error
        401:
          description: Unauthorized
        500:
          description: Internal server error

  /api/work-order-scan/{workOrderScanUuid}/zone/{zoneCode}/save-result:
    post:
      tags:
        - Work Order Scan
      summary: Save work order scan result
      description: Save single or batch scan results for a work order scan session and zone
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: workOrderScanUuid
          required: true
          schema:
            type: string
          example: 401ed05f-d696-40d3-a8f1-40ed5b1f65b0
          
        - in: query
          name: locationId
          schema:
            type: string
          example: S686

        - in: path
          name: zoneCode
          required: true
          schema:
            type: string
          example: PANTRY

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assets:
                  type: array
                  description: Batch scan payload (recommended)
                  items:
                    type: object
                    properties:
                      assetCode:
                        type: string
                      assetStatus:
                        type: string
                      scanSeq:
                        type: integer
              example:
                assets:
                  - assetCode: "FF25001/HQ"
                    assetStatus: "MATCHED"
                    scanSeq: 1
                  - assetCode: "FF25003/HQ"
                    assetStatus: "MISSING"
                    scanSeq: 2

      responses:
        200:
          description: Scan(s) processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      success:
                        type: integer
                      failed:
                        type: integer

  /api/work-order-scan/status:
    get:
      tags:
        - Work Order Scan
      summary: Get work order scan status
      description: |
        Fetch scan status details for a specific work order ID using HXGN Grid 0U5003.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: workOrderId
          required: true
          schema:
            type: string
          description: Work order ID to fetch scan status
          example: "30085"
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        uuid:
                          type: string
                          example: "BDC8F595-8FA6-4D1A-8E66-B8BC83CB3B71"
                        workOrderId:
                          type: string
                          example: "30085"
                        status:
                          type: string
                          example: "1st Scan - In Progress"
        400:
          description: Bad request
        401:
          description: Unauthorized
        500:
          description: Server error

  /api/work-order-scan/assets:
    get:
      summary: Get scanned assets by work order
      description: Retrieve scanned asset results for a given work order and scan sequence.
      tags:
        - Work Order Scan
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: workOrderId
          required: true
          schema:
            type: string
          description: Work Order ID
          example: 30085

        - in: query
          name: scanSeq
          required: false
          schema:
            type: integer
          description: Scan sequence number
          example: 1

      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        assetCode:
                          type: string
                          example: "FF25001/HQ"
                        description:
                          type: string
                          example: "PANASONIC MWO NN-ST34NBMPQ"
                        organization:
                          type: string
                          example: "Toyota Tsusho"
                        organizationCode:
                          type: string
                          example: "TSUSHO"
                        location:
                          type: string
                          example: "Head Office"
                        department:
                          type: string
                          example: "GAD"
                        zone:
                          type: string
                          example: "Pantry Area"
                        zoneCode:
                          type: string
                          example: "PANTRY"
                        currentZoneCode:
                          type: string
                          example: "PANTRY"
                        status:
                          type: string
                          example: "I"
                        scanStatus:
                          type: string
                          example: "MATCHED"
                        scanSeq:
                          type: integer
                          example: 1
                        rfidCode:
                          type: string
                          example: "E280116060000206126D6D20"
                        reason:
                          type: string
                          example: ""
                        commissionDate:
                          type: string
                          example: "26-SEP-2025 00:00"
                        profilePicture:
                          type: string
                          example: "FF25001/HQ_PP1"
                        workOrderId:
                          type: string
                          example: "30085"
                        workOrderScanUuid:
                          type: string
                          example: "ADC50696-2E93-4333-AFEA-B55D1DD1586A"
                  message:
                    type: string
                    example: ""

        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /api/asset/metadata:
    get:
      tags:
        - Asset
      summary: Get asset metadata
      description: Retrieve asset metadata such as location and primary system
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        location:
                          type: string
                          example: "Warehouse A"
                        primarySystem:
                          type: string
                          example: "Electrical"
                        id:
                          type: string
                          example: "12345"
                  message:
                    type: string
                    example: ""
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error

  /api/asset/rfid:
    patch:
      tags:
        - Asset
      summary: Update RFID Code for an asset
      description: Update UDFCHAR04 (RFID Code) for a specific asset
      security:
        - bearerAuth: []

      parameters:
        - name: assetCode
          in: query
          required: true
          schema:
            type: string
          example: FF25003/HQ

        - name: orgCode
          in: query
          required: true
          schema:
            type: string
          example: TSUSHO

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rfidCode
              properties:
                rfidCode:
                  type: string
                  example: E280116060000206126D6D22

      responses:
        "200":
          description: RFID updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      message:
                        type: string
                      rfidCode:
                        type: string
                  message:
                    type: string

        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Asset not found
        "500":
          description: Internal server error